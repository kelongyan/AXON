services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: agentflow
      POSTGRES_USER: agentflow
      POSTGRES_PASSWORD: agentflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentflow -d agentflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: agentflow
      MINIO_ROOT_PASSWORD: agentflowsecret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: quay.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 agentflow agentflowsecret &&
      mc mb --ignore-existing local/agentflow-artifacts
      "

  api:
    build:
      context: ./apps/api
    environment:
      AGENTFLOW_ENVIRONMENT: development
      AGENTFLOW_CHECK_DEPENDENCIES: "true"
      AGENTFLOW_CORS_ALLOWED_ORIGINS: http://localhost:5180
      AGENTFLOW_DATABASE_URL: postgresql+psycopg://agentflow:agentflow@postgres:5432/agentflow
      AGENTFLOW_REDIS_URL: redis://redis:6379/0
      AGENTFLOW_MINIO_ENDPOINT_URL: http://minio:9000
      AGENTFLOW_MINIO_ACCESS_KEY: agentflow
      AGENTFLOW_MINIO_SECRET_KEY: agentflowsecret
      AGENTFLOW_MINIO_BUCKET: agentflow-artifacts
      AGENTFLOW_API_AUTH_KEY: ${AGENTFLOW_API_AUTH_KEY:-}
      AGENTFLOW_LLM_API_BASE_URL: ${AGENTFLOW_LLM_API_BASE_URL:-https://api.openai.com/v1}
      AGENTFLOW_LLM_API_KEY: ${AGENTFLOW_LLM_API_KEY:-}
      AGENTFLOW_LLM_MODEL: ${AGENTFLOW_LLM_MODEL:-gpt-4.1-mini}
      AGENTFLOW_EMBEDDING_API_BASE_URL: ${AGENTFLOW_EMBEDDING_API_BASE_URL:-}
      AGENTFLOW_EMBEDDING_API_KEY: ${AGENTFLOW_EMBEDDING_API_KEY:-}
      AGENTFLOW_EMBEDDING_MODEL: ${AGENTFLOW_EMBEDDING_MODEL:-text-embedding-3-small}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8000:8000"

  migrate:
    build:
      context: ./apps/api
    command: ["python", "-m", "alembic", "upgrade", "head"]
    environment:
      AGENTFLOW_DATABASE_URL: postgresql+psycopg://agentflow:agentflow@postgres:5432/agentflow
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: ./apps/api
    command: ["python", "-m", "app.worker.main"]
    environment:
      AGENTFLOW_ENVIRONMENT: development
      AGENTFLOW_CHECK_DEPENDENCIES: "true"
      AGENTFLOW_CORS_ALLOWED_ORIGINS: http://localhost:5180
      AGENTFLOW_DATABASE_URL: postgresql+psycopg://agentflow:agentflow@postgres:5432/agentflow
      AGENTFLOW_REDIS_URL: redis://redis:6379/0
      AGENTFLOW_WORKER_ID: ${AGENTFLOW_WORKER_ID:-worker-1}
      AGENTFLOW_WORKER_POLL_INTERVAL_SECONDS: ${AGENTFLOW_WORKER_POLL_INTERVAL_SECONDS:-30}
      AGENTFLOW_WORKER_LEASE_SECONDS: ${AGENTFLOW_WORKER_LEASE_SECONDS:-60}
      AGENTFLOW_WORKER_MAX_RUNS_PER_CYCLE: ${AGENTFLOW_WORKER_MAX_RUNS_PER_CYCLE:-10}
      AGENTFLOW_MINIO_ENDPOINT_URL: http://minio:9000
      AGENTFLOW_MINIO_ACCESS_KEY: agentflow
      AGENTFLOW_MINIO_SECRET_KEY: agentflowsecret
      AGENTFLOW_MINIO_BUCKET: agentflow-artifacts
      AGENTFLOW_API_AUTH_KEY: ${AGENTFLOW_API_AUTH_KEY:-}
      AGENTFLOW_LLM_API_BASE_URL: ${AGENTFLOW_LLM_API_BASE_URL:-https://api.openai.com/v1}
      AGENTFLOW_LLM_API_KEY: ${AGENTFLOW_LLM_API_KEY:-}
      AGENTFLOW_LLM_MODEL: ${AGENTFLOW_LLM_MODEL:-gpt-4.1-mini}
      AGENTFLOW_EMBEDDING_API_BASE_URL: ${AGENTFLOW_EMBEDDING_API_BASE_URL:-}
      AGENTFLOW_EMBEDDING_API_KEY: ${AGENTFLOW_EMBEDDING_API_KEY:-}
      AGENTFLOW_EMBEDDING_MODEL: ${AGENTFLOW_EMBEDDING_MODEL:-text-embedding-3-small}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  web:
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_API_BASE_URL: /api/agentflow
    environment:
      AGENTFLOW_API_BASE_URL: http://api:8000
      AGENTFLOW_API_AUTH_KEY: ${AGENTFLOW_API_AUTH_KEY:-}
      AGENTFLOW_CONSOLE_WORKSPACE_SLUG: ${AGENTFLOW_CONSOLE_WORKSPACE_SLUG:-}
      AGENTFLOW_CONSOLE_WORKSPACE_NAME: ${AGENTFLOW_CONSOLE_WORKSPACE_NAME:-}
      AGENTFLOW_CONSOLE_USER_EMAIL: ${AGENTFLOW_CONSOLE_USER_EMAIL:-}
      AGENTFLOW_CONSOLE_USER_NAME: ${AGENTFLOW_CONSOLE_USER_NAME:-}
    depends_on:
      - api
    ports:
      - "5180:3000"

volumes:
  postgres_data:
  redis_data:
  minio_data:
